name: quiverscore
description: "QuiverScore - Archery scoring and tournament play"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Networking
  dio: ^5.9.2
  connectivity_plus: ^7.1.1

  # Local database
  drift: ^2.28.2
  sqlite3_flutter_libs: ^0.6.0+eol

  # Secure storage (auth tokens)
  flutter_secure_storage: ^10.0.0

  # Camera & images
  image_picker: ^1.2.2
  path_provider: ^2.1.5

  # Utilities
  uuid: ^4.5.3
  intl: ^0.20.2
  json_annotation: ^4.9.0
  freezed_annotation: ^3.1.0
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.4.15
  json_serializable: ^6.9.5
  freezed: ^3.0.6
  riverpod_generator: ^2.6.5
  drift_dev: ^2.27.0
  mockito: ^5.4.6

flutter:
  uses-material-design: true
