name: quiverscore
description: "QuiverScore - Archery scoring and tournament play"
publish_to: 'none'
version: 1.4.0+6

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1

  # Networking
  dio: ^5.9.2
  connectivity_plus: ^7.1.1

  # Local database
  drift: ^2.34.0

  # Secure storage (auth tokens)
  flutter_secure_storage: ^10.0.0

  # Biometric authentication
  local_auth: ^2.3.0

  # Camera & images
  image_picker: ^1.2.2
  path_provider: ^2.1.5

  # Utilities
  uuid: ^4.5.3
  intl: ^0.20.2
  json_annotation: ^4.12.0
  freezed_annotation: ^3.1.0
  url_launcher: ^6.3.2
  sqlite3_flutter_libs: ^0.6.0
  flutter_image_compress: ^2.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.15.0
  json_serializable: ^6.14.0
  freezed: ^3.2.0
  drift_dev: ^2.34.0
  # 5.7.0 needs analyzer ^13 (meta 1.18.3) which requires a newer Flutter SDK
  # than 3.41.9 pins; cap here until the SDK is bumped.
  mockito: ^5.6.4
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"
  adaptive_icon_background: "#0d9668"
  adaptive_icon_foreground: "assets/icon.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true
