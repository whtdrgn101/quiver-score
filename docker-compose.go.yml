# Overlay to run Go API as primary entrypoint.
# Usage: docker compose -f docker-compose.yml -f docker-compose.go.yml up -d
#
# Go API listens on :8080 (public). Python runs Alembic migrations then exits.
services:
  api-go:
    build: ./backend-go
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgresql+asyncpg://quiverscore:quiverscore@db:5432/quiverscore
      SECRET_KEY: dev-secret-key-change-in-production
      CORS_ORIGINS: "http://localhost:5173"
      PORT: "8080"
      RATE_LIMIT_ENABLED: "false"
    depends_on:
      db:
        condition: service_healthy
      api:
        condition: service_completed_successfully
    restart: unless-stopped
