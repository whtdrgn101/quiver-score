name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_call:

jobs:
  backend-go-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend-go

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Run tests
        run: go test ./... -v

  migrations-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8

      - name: Ensure a single Alembic head
        run: |
          count=$(uv run alembic heads | grep -c .)
          if [ "$count" -ne 1 ]; then
            echo "::error::Found $count Alembic heads (expected 1). The migration history has forked — run 'uv run alembic merge heads' to resolve before merging."
            uv run alembic heads
            exit 1
          fi
          echo "OK: single Alembic head."

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
