services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: quiverscore
      POSTGRES_PASSWORD: quiverscore
      POSTGRES_DB: quiverscore
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quiverscore"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Python: Alembic migrations only. Runs migrations then exits.
  api:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://quiverscore:quiverscore@db:5432/quiverscore
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/alembic:/code/alembic
    command: sh -c "uv run alembic upgrade head"
    restart: "no"

volumes:
  pgdata:
